name: Build and push container
enable-email-notifications: true

on:
  push:
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'config/**'
  schedule:
    - cron: '0 1 1 * *'

jobs:
  build:
    runs-on: docker
    container:
      image: codeberg.org/0x2321/ci:latest
    strategy:
      matrix:
        info:
          - tag: latest
            version: ">=3.3,<3.4"
            latex: false
          - tag: latest-latex
            version: ">=3.3,<3.4"
            latex: true
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'amd64'
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.FORGEJO_SERVER_URL }}
          username: ${{ env.FORGEJO_REPOSITORY_OWNER }}
          password: ${{ secrets.PACKAGE_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            INDICO_VERSION=${{ matrix.info.version }}
            INSTALL_XETEX=${{ matrix.info.latex }}
          tags: codeberg.org/${{ env.FORGEJO_REPOSITORY }}:${{ matrix.info.tag }}
          context: .